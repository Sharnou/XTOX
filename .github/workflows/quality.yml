name: Quality checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-dup-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install deps (no lockfile)
        run: npm install --no-fund --no-audit --ignore-scripts --package-lock=false

      - name: ESLint
        run: npm run lint

      - name: Duplicate code scan (jscpd)
        run: npx jscpd src --threshold 2 --min-lines 5 --reporters console
