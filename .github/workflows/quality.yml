name: Quality checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-dup-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm install --no-fund --no-audit --prefer-offline

      - name: ESLint
        run: npm run lint

      - name: Duplicate code scan (jscpd)
        run: npx jscpd --path src --threshold 2 --min-lines 5 --reporters console
